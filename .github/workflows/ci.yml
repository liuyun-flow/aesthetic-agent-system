name: CI

# V2.5 N1: gate every PR/push on the free, deterministic checks —
# mocked backend tests (no API key) + frontend production build.
# Paid, non-deterministic agent evals run separately (on-release), never here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest, mocked)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest app/tests/ -q

  frontend-build:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Component tests (Vitest)
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      # Playwright boots backend (uvicorn) + frontend (next dev), then runs the
      # smoke flow. No API key — the smoke tests avoid LLM-backed endpoints.
      - name: Run E2E
        run: npm run e2e
        working-directory: frontend
