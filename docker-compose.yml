version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/database:/app/data/database
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000
    depends_on:
      - backend
    restart: unless-stopped
